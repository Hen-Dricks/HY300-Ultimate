<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="828" viewBox="0 0 1200 828">
<defs><filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity=".14"/></filter></defs>
<rect width="100%" height="100%" fill="#f8fafc"/>
