<text x="600" y="148" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="700" fill="#0f172a">Applications</text>
<text x="600" y="180" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" fill="#334155">Launcher, media apps and external display sources</text>
